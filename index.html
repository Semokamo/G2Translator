<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Farsi Rendering Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;500&family=Vazirmatn:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      background: #111;
      color: #f5f5f5;
    }

    #app {
      max-width: 680px;
      margin: 24px auto;
      padding: 16px;
    }

    .panel {
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 14px;
      background: #181818;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .label {
      display: block;
      margin-top: 10px;
      color: #c7c7c7;
      font-size: 13px;
    }

    input,
    select {
      flex: 1;
      min-width: 220px;
      border-radius: 8px;
      border: 1px solid #3b3b3b;
      background: #101010;
      color: #fff;
      padding: 10px;
      font-size: 16px;
    }

    .inline-number {
      max-width: 140px;
      min-width: 120px;
    }

    button {
      border-radius: 8px;
      border: 1px solid #3b3b3b;
      background: #222;
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
    }

    #preview {
      margin-top: 12px;
      font-size: 26px;
      direction: rtl;
      text-align: right;
      font-family: 'Vazirmatn', 'Noto Naskh Arabic', Tahoma, sans-serif;
      min-height: 36px;
      border-top: 1px solid #2e2e2e;
      padding-top: 10px;
    }

    #wordInput {
      font-family: 'Vazirmatn', 'Noto Naskh Arabic', Tahoma, sans-serif;
    }

    #status {
      margin-top: 8px;
      color: #9d9d9d;
      font-size: 13px;
    }

    .menu-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2e2e2e;
    }

    #fontModeValue {
      color: #c7c7c7;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <div>Farsi Rendering Bridge</div>
      <label class="label" for="experienceModeSelect">Mode</label>
      <select id="experienceModeSelect">
        <option value="translator">1) Farsi Translator</option>
        <option value="assistant">2) AI Assistant</option>
      </select>
      <div id="translatorControls">
        <label class="label" for="targetLangSelect">Target language</label>
        <select id="targetLangSelect">
          <option value="fa">Farsi (Persian)</option>
          <option value="ar">Arabic</option>
          <option value="ur">Urdu</option>
        </select>
        <label class="label" for="idleClearSecondsInput">Disappear delay (seconds)</label>
        <input id="idleClearSecondsInput" class="inline-number" type="number" min="1" max="60" step="1" value="4" />
        <div class="row">
          <button id="startMicBtn" type="button">Start real-time EN→FA</button>
          <button id="stopMicBtn" type="button">Stop</button>
        </div>
        <div class="row">
          <input id="wordInput" type="text" dir="rtl" placeholder="Type a word..." />
          <button id="addWordBtn" type="button">Add word</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>
        <div id="preview"></div>
        <div class="menu-row">
          <button id="fontDecBtn" type="button">A- (Small)</button>
          <span id="fontModeValue">Large (3 lines)</span>
          <button id="fontIncBtn" type="button">A+ (Large)</button>
          <button id="fontXlBtn" type="button">A++ (XL)</button>
        </div>
      </div>
      <div id="assistantControls" style="display:none;">
        <div class="label">AI Assistant mode on glasses:</div>
        <div class="label">- Scroll chat with up/down</div>
        <div class="label">- Enter keyboard: up up down down</div>
        <div class="label">- Submit in keyboard with double-click</div>
        <div class="menu-row">
          <button id="assistantFontDecBtn" type="button">A- (Small)</button>
          <span id="assistantFontModeValue">Large (chat)</span>
          <button id="assistantFontIncBtn" type="button">A+ (Large)</button>
          <button id="assistantFontXlBtn" type="button">A++ (XL)</button>
        </div>
      </div>
      <div id="status">Connecting to Even bridge...</div>
    </div>
  </div>
  <script type="module" src="/index.ts"></script>
</body>
</html>
